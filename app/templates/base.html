<!DOCTYPE html>
<html>
<head>
    <title>Document Manager</title>
</head>
<body>

    <h2>Document Manager</h2>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <p style="color:red;">{{ msg }}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}

</body>
</html>
